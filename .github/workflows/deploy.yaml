name: Build and Deploy
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "thatgurkangurk/alter-bot"
  CARGO_TERM_COLOR: always
  BIN_NAME: alter-bot
  MISE_EXPERIMENTAL: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: commit
        name: Commit Hash
        uses: prompt/actions-commit-hash@v4

      - id: bin_version
        name: Determine Binary Version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ steps.commit.outputs.short }}-unstable" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Install dependencies (mold & ARM cross-compiler)
        run: |
          sudo apt-get update
          sudo apt-get install -y mold build-essential gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: debian-multiarch

      - name: Build Release Binary (AMD64)
        run: |
          cargo build --release
          mkdir -p ./deploy-out/amd64
          cp target/release/alter-bot ./deploy-out/amd64/
        env:
          RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
          DATA_DIR: "/app/data"
          APP_VERSION: ${{ steps.bin_version.outputs.VERSION }}
          IS_IN_CONTAINER: "1"

      - name: Build Release Binary (ARM64)
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
          mkdir -p ./deploy-out/arm64
          cp target/aarch64-unknown-linux-gnu/release/alter-bot ./deploy-out/arm64/
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          DATA_DIR: "/app/data"
          APP_VERSION: ${{ steps.bin_version.outputs.VERSION }}
          IS_IN_CONTAINER: "1"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.commit.outputs.short }},enable=${{ github.ref_name == 'main' }}
            type=raw,value=we-test-in-production,enable=${{ github.ref_name == 'main' }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push multi-arch
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.bin_version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: Dockerfile.actions

      - name: Trigger Deploy Webhook
        run: |
          curl --request POST '${{ secrets.DEPLOY_WEBHOOK }}'
